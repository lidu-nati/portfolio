<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🛍️ My Store</h1>
            <div class="cart-icon">
                🛒 Cart
                <span id="cartCount" class="cart-count">0</span>
            </div>
        </header>
        <div class="products-section">
            <h2>Our Products</h2>
            <div class="products-grid" id="productsGrid"></div>
        </div>
        <div class="cart-section" id="cartSection">
            <h2>Shopping Cart</h2>
            <div id="cartItems" class="cart-items">
                <p class="empty-cart">Your cart is empty</p>
            </div>
            <div class="cart-summary">
                <div class="discount-section">
                    <input type="text" id="discountCode" placeholder="Discount Code">
                    <button id="applyDiscountBtn">Apply</button>
                    <p class="discount-note">Try code: SAVE10 or SAVE20</p>
                </div>
                <div class="total-section">
                    <p>Subtotal: $<span id="subtotal">0</span></p>
                    <p>Discount: -$<span id="discountAmount">0</span></p>
                    <p class="total">Total: $<span id="total">0</span></p>
                </div>
                <button id="checkoutBtn" class="checkout-btn">Proceed to Checkout</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
