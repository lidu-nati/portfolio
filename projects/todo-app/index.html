<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <div class="header">
            <h1>📋 TaskMaster</h1>
            <div class="header-actions">
                <button id="themeToggle" class="theme-btn">🌙</button>
            </div>
        </div>

        <!-- Color Themes -->
        <div class="themes">
            <button class="color-dot purple active" data-color="purple"></button>
            <button class="color-dot blue" data-color="blue"></button>
            <button class="color-dot green" data-color="green"></button>
            <button class="color-dot orange" data-color="orange"></button>
        </div>

        <!-- Quick Stats -->
        <div class="stats">
            <div class="stat-item">
                <span class="stat-value" id="totalNum">0</span>
                <span class="stat-label">Total</span>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="pendingNum">0</span>
                <span class="stat-label">Pending</span>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="doneNum">0</span>
                <span class="stat-label">Done</span>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="scoreVal">0%</span>
                <span class="stat-label">Score</span>
            </div>
        </div>

        <!-- Add Task -->
        <div class="add-task">
            <div class="add-row">
                <input type="text" id="taskInput" placeholder="What do you need to do?">
                <button id="addBtn">+ Add</button>
            </div>
            <div class="add-options">
                <select id="prioritySelect">
                    <option value="low">🟢 Low</option>
                    <option value="medium" selected>🟡 Medium</option>
                    <option value="high">🔴 High</option>
                </select>
                <select id="categorySelect">
                    <option value="work">💼 Work</option>
                    <option value="personal">🏠 Home</option>
                    <option value="shopping">🛒 Shop</option>
                    <option value="health">💪 Health</option>
                </select>
                <input type="text" id="tagInput" placeholder="Tags (work, urgent)">
            </div>
        </div>

        <!-- Search & Filters -->
        <div class="filters">
            <input type="text" id="searchInput" placeholder="🔍 Search tasks...">
            <select id="filterPriority">
                <option value="all">All Priorities</option>
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
            </select>
            <select id="filterCategory">
                <option value="all">All Categories</option>
                <option value="work">Work</option>
                <option value="personal">Home</option>
                <option value="shopping">Shop</option>
                <option value="health">Health</option>
            </select>
            <select id="filterTag">
                <option value="all">All Tags</option>
            </select>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" data-filter="all">All</button>
            <button class="tab" data-filter="pending">Pending</button>
            <button class="tab" data-filter="completed">Done</button>
        </div>

        <!-- Task List -->
        <div id="taskList" class="task-list">
            <div class="empty">✨ No tasks yet</div>
        </div>

        <!-- Actions -->
        <div class="actions">
            <button id="clearCompletedBtn" class="btn-clear">Clear Done</button>
            <button id="exportBtn" class="btn-action">Export</button>
            <button id="importBtn" class="btn-action">Import</button>
        </div>
        <input type="file" id="importFile" accept=".json" style="display: none">
    </div>
    <script src="script.js"></script>
</body>
</html>
